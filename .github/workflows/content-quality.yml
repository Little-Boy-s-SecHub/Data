name: content-quality

on:
  pull_request:
  push:
    branches: [main, fix/learning-readiness-v1]
  workflow_dispatch:
    inputs:
      release_gate:
        description: Run public release validation
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  structural-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python scripts/build_audit_artifacts.py
      - run: git diff --exit-code -- CONTENT_PROVENANCE.md audit/payload-ledger.json audit/source-ledger.json audit/cwe-mapping-ledger.json audit/release-readiness.md
      - run: python scripts/validate_content.py --json audit/validation-pr.json
      - run: python scripts/check_baseline_manifest.py
      - run: python scripts/check_markdown_render.py
      - run: python scripts/check_code_comments.py
      - run: python scripts/check_terminology.py
      - run: python scripts/check_duplicate_prose.py
      - run: python scripts/scan_sensitive_data.py
      - run: python scripts/check_payload_safety.py
      - run: python scripts/check_training_endpoints.py
      - run: python scripts/check_runnable_blocks.py
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q scripts
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser

  release-gate:
    if: github.event_name == 'workflow_dispatch' && inputs.release_gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python scripts/build_audit_artifacts.py
      - run: python scripts/check_external_links.py --retries 3 --cache-hours 0 --output audit/external-link-status.json
      - run: git diff --exit-code -- CONTENT_PROVENANCE.md audit/payload-ledger.json audit/source-ledger.json audit/cwe-mapping-ledger.json audit/release-readiness.md
      - run: python scripts/check_baseline_manifest.py
      - run: python scripts/validate_content.py --release --json audit/validation-release.json

  scheduled-link-check:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_external_links.py --retries 3 --output audit/external-link-status.json
